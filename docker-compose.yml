services:
  postgres_db:
    image: postgres:15-alpine
    container_name: my-postgres-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-todo-app
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_HOST=postgres_db
      - DB_NAME=tododb
      - DB_PORT=5432
      - DB_SSL=false
      - NODE_ENV=production
    depends_on:
      - postgres_db

volumes:
  pgdata:
