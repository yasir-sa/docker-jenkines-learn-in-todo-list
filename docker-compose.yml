version: '3.8'

services:
  # 1. Database Service (Postgres)
  postgres_db:
    image: postgres:15-alpine
    container_name: my-postgres-db
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: tododb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  # 2. Backend Service (Express Server)
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: my-running-backend-compose
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DB_USER=myuser
      - DB_PASSWORD=mypassword
      - DB_HOST=postgres_db
      - DB_NAME=tododb
      - DB_PORT=5432
    depends_on:
      - postgres_db

  # 3. Frontend Service (React Vite)
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: my-running-frontend-compose
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  pgdata: